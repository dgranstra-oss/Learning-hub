<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bradley's Math Mission</title>
<style>
  :root{
    --navy:#1a1a1a;
    --gold:#e63946;
    --teal:#4a4a4a;
    --cream:#f5f1ee;
    --red:#d62828;
    --green:#3aa655;
    --purple:#2b2b2b;
    --blue:#2b6cb0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Trebuchet MS', Verdana, sans-serif;
    background:linear-gradient(160deg, #1a0000 0%, #4a0404 35%, #7a0c0c 65%, #1a0000 100%);
    color:var(--navy);
    padding:24px;
    min-height:100vh;
  }
  .header h1{
    font-size:2.1em;
    margin:0;
    color:#ffffff;
    text-shadow:0 2px 8px rgba(0,0,0,0.5);
  }
  .header p{
    color:#f4a8a8;
    font-weight:bold;
    margin:6px 0 0;
  }
  .header{
    text-align:center;
    margin-bottom:20px;
  }
  .stats{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-bottom:24px;
    flex-wrap:wrap;
  }
  .stat{
    background:white;
    border:3px solid var(--navy);
    border-radius:12px;
    padding:10px 18px;
    text-align:center;
    min-width:110px;
  }
  .stat .num{
    font-size:1.6em;
    font-weight:bold;
    color:var(--navy);
  }
  .stat .label{
    font-size:0.85em;
    color:var(--teal);
    font-weight:bold;
  }
  .card{
    max-width:560px;
    margin:0 auto;
    background:white;
    border:4px solid var(--navy);
    border-radius:20px;
    padding:28px 26px;
    text-align:center;
  }
  .tag{
    display:inline-block;
    background:var(--purple);
    color:white;
    font-size:0.8em;
    font-weight:bold;
    padding:4px 12px;
    border-radius:20px;
    margin-bottom:14px;
    letter-spacing:0.5px;
  }
  .qtext{
    font-size:2em;
    font-weight:bold;
    margin:10px 0 22px;
  }
  input#answer{
    width:140px;
    font-size:1.5em;
    padding:8px 10px;
    border:3px solid var(--teal);
    border-radius:10px;
    text-align:center;
  }
  input#answer::-webkit-outer-spin-button,
  input#answer::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  input#answer{
    -moz-appearance:textfield;
  }
  .actions{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }
  button{
    border:none;
    border-radius:10px;
    padding:12px 22px;
    font-size:1.05em;
    font-weight:bold;
    cursor:pointer;
  }
  #checkBtn{ background:var(--teal); color:white; }
  #checkBtn:hover{ background:#239e92; }
  #nextBtn{ background:var(--gold); color:var(--navy); display:none; }
  #nextBtn:hover{ background:#e0961f; }
  .feedback{
    margin-top:18px;
    font-size:1.3em;
    font-weight:bold;
    min-height:32px;
  }
  .correct{ color:var(--green); }
  .incorrect{ color:var(--red); }
  .explain{
    margin-top:14px;
    background:#fff4e0;
    border-left:5px solid var(--gold);
    border-radius:8px;
    padding:12px 16px;
    text-align:left;
    font-size:1.05em;
    display:none;
  }
  .explain.show{ display:block; }
  .qmath{
    font-family:'Courier New', monospace;
    display:inline-block;
    margin:10px 0 22px;
  }
  .qmath .vrow{
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    gap:10px;
  }
  .qmath .vop{
    width:30px;
    text-align:center;
    font-weight:bold;
    align-self:center;
    font-size:1.9em;
  }
  .qmath .vcell{
    width:50px;
    height:56px;
    text-align:center;
    font-size:2.3em;
    font-weight:bold;
  }
  .qmath .vline{
    border-top:4px solid var(--navy);
    margin:6px 0 0;
  }
  .vmath{
    font-family:'Courier New', monospace;
    display:inline-block;
    margin:22px 0 6px;
  }
  .vrow{
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    gap:4px;
  }
  .vop{
    width:18px;
    text-align:center;
    font-weight:bold;
    align-self:center;
  }
  .vcell{
    position:relative;
    width:32px;
    height:34px;
    text-align:center;
    font-size:1.3em;
    font-weight:bold;
  }
  .vcell .sup{
    position:absolute;
    top:-22px;
    left:0;
    right:0;
    font-size:0.6em;
    color:var(--red);
    font-weight:bold;
    white-space:nowrap;
  }
  .vcell .strike{
    text-decoration:line-through;
    color:#999;
  }
  .vline{
    border-top:3px solid var(--navy);
    margin:2px 0;
  }
  .vlabel{
    font-family:'Trebuchet MS', Verdana, sans-serif;
    font-size:0.85em;
    color:var(--navy);
    margin:6px 0 4px;
    font-weight:bold;
    line-height:1.4;
  }
  .vstep{
    margin:10px 0;
  }
  .division-box{
    display:inline-flex;
    align-items:flex-start;
    font-family:'Courier New', monospace;
    font-size:1.3em;
    font-weight:bold;
  }
  .division-divisor{
    padding-right:8px;
    border-right:3px solid var(--navy);
    margin-right:6px;
  }
  .division-top{
    border-top:3px solid var(--navy);
    padding-top:2px;
  }
  .fraction-visual{
    display:inline-block;
    text-align:center;
    font-family:'Courier New', monospace;
    font-size:1.3em;
    font-weight:bold;
    vertical-align:middle;
    margin:0 8px;
  }
  .fraction-visual .fnum, .fraction-visual .fden{
    display:block;
    padding:0 6px;
  }
  .fraction-visual .fnum{
    border-bottom:3px solid var(--navy);
  }
  .fraction-visual .fnum .strike, .fraction-visual .fden .strike{
    text-decoration:line-through;
    color:#999;
    font-size:0.8em;
  }
  .fraction-visual .new-val{
    color:var(--green);
  }
  .arrow-down{
    text-align:center;
    font-size:1.1em;
    margin:2px 0;
    color:var(--navy);
  }
  .streakflame{
    color:var(--gold);
  }
  .topics{
    text-align:center;
    margin-top:24px;
    font-size:0.9em;
    color:#e3b8b8;
  }
  .overlay{
    display:none;
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:rgba(27,42,74,0.85);
    z-index:999;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .game-card{
    background:var(--cream);
    border:5px solid var(--gold);
    border-radius:20px;
    padding:24px;
    max-width:480px;
    width:100%;
    text-align:center;
  }
  .game-card h2{
    margin:0 0 6px;
    color:var(--navy);
  }
  .game-card .sub{
    color:var(--purple);
    font-weight:bold;
    margin-bottom:16px;
  }
  .memory-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    margin:0 auto 18px;
    max-width:400px;
  }
  .memory-tile{
    aspect-ratio:1/1;
    background:var(--navy);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.8em;
    cursor:pointer;
    user-select:none;
    transition:transform 0.15s;
  }
  .memory-tile.flipped{
    background:white;
    border:3px solid var(--teal);
  }
  .memory-tile.matched{
    background:#d4f5e1;
    border:3px solid var(--green);
    cursor:default;
  }
  .game-status{
    font-weight:bold;
    color:var(--navy);
    margin-bottom:14px;
    min-height:24px;
  }
  .closeGameBtn{
    background:var(--teal);
    color:white;
  }
  .closeGameBtn:hover{ background:#239e92; }
  .simon-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    margin:0 auto 18px;
    max-width:280px;
  }
  .simon-tile{
    aspect-ratio:1/1;
    border-radius:16px;
    cursor:pointer;
    opacity:0.55;
    transition:opacity 0.15s, transform 0.1s;
  }
  .simon-tile.lit{
    opacity:1;
    transform:scale(0.96);
  }
  .simon-tile.red{ background:#d62828; }
  .simon-tile.green{ background:#2a9d8f; }
  .simon-tile.teal{ background:#1d3557; }
  .simon-tile.gold{ background:#e9c46a; }
  .seq-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    margin:0 auto 18px;
    max-width:400px;
  }
  .seq-tile{
    aspect-ratio:1/1;
    background:var(--navy);
    color:white;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6em;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
  }
  .seq-tile.used{
    background:#d4f5e1;
    color:var(--green);
    cursor:default;
  }
  .seq-tile.wrong{
    background:var(--red);
  }
  .choice-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    max-width:420px;
    margin:14px auto 0;
  }
  .choice-btn{
    background:white;
    border:3px solid var(--teal);
    border-radius:14px;
    padding:14px 10px;
    cursor:pointer;
    font-size:1.5em;
    line-height:1.3;
    word-break:break-word;
    transition:transform 0.1s, border-color 0.15s;
  }
  .choice-btn:hover{
    transform:translateY(-2px);
    border-color:var(--blue);
  }
  .choice-btn.picked-correct{
    border-color:var(--green);
    background:#d4f5e1;
  }
  .choice-btn.picked-wrong{
    border-color:var(--red);
    background:#fbe1e1;
  }
  .choice-btn:disabled{
    cursor:default;
  }
</style>
</head>
<body>

<a href="bradley_hub.html" style="display:inline-block;color:#f4a8a8;font-weight:bold;text-decoration:none;margin-bottom:10px;">&larr; Back to profile</a>
<div class="header">
  <h1>🔥 Bradley's Math Mission</h1>
  <p>1st Grade Review • Getting Ready for 2nd Grade</p>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="scoreNum">0</div><div class="label">Correct</div></div>
  <div class="stat"><div class="num" id="attemptNum">0</div><div class="label">Attempted</div></div>
  <div class="stat"><div class="num" id="streakNum">0</div><div class="label">Streak 🔥</div></div>
  <div class="stat"><div class="num" id="bestNum">0</div><div class="label">Best Streak</div></div>
</div>

<div class="card">
  <div class="tag" id="tag">TOPIC</div>
  <div class="qtext" id="qtext">Loading...</div>
  <input type="number" id="answer" autocomplete="off">
  <div class="choice-grid" id="choiceGrid" style="display:none;"></div>
  <div class="actions">
    <button id="checkBtn" onclick="checkAnswer()">Check</button>
    <button id="skipBtn" onclick="skipProblem()">Skip</button>
    <button id="nextBtn" onclick="nextProblem()">Next Problem →</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="explain" id="explainBox"></div>
</div>

<div class="topics">New problems generate forever — keep going as long as you like!</div>

<div class="overlay" id="rewardOverlay">
  <div class="game-card">
    <h2 id="gameTitle">🎉 12 in a Row!</h2>
    <div class="sub" id="gameSub">You unlocked a game!</div>
    <div class="game-status" id="gameStatus">Find all the matching pairs!</div>
    <div id="gameContent"></div>
    <button class="closeGameBtn" id="backToMathBtn" onclick="closeRewardGame()">Back to Math →</button>
  </div>
</div>

<script>
let score = 0, attempts = 0, streak = 0, best = 0;
let current = null;

function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ---- Problem generators ----
// ===== Visual helpers =====
function placeName(idx){
  const names = ['ones','tens','hundreds','thousands'];
  return names[idx] || `10^${idx} place`;
}
function toSuperscript(n){
  const map = {2:'²',3:'³',4:'⁴',5:'⁵',6:'⁶'};
  return map[n] || ('^'+n);
}
function digitCell(main, supText, strike){
  return `<span class="vcell">${supText ? `<span class="sup">${supText}</span>` : ''}<span class="${strike?'strike':''}">${main}</span></span>`;
}
function blankCell(){ return `<span class="vcell"></span>`; }
function opCell(sym){ return `<span class="vop">${sym}</span>`; }

// ===== Visual: Addition (carrying) =====
function buildAddVisual(a, b){
  const len = Math.max(String(a).length, String(b).length) ;
  const totalLen = len + 1;
  const da = String(a).padStart(totalLen,' ');
  const db = String(b).padStart(totalLen,' ');
  let carry = 0;
  const carryRow = new Array(totalLen).fill('');
  const resultRow = new Array(totalLen).fill('');
  for(let i=totalLen-1;i>=0;i--){
    const x = da[i] === ' ' ? 0 : Number(da[i]);
    const y = db[i] === ' ' ? 0 : Number(db[i]);
    const total = x + y + carry;
    if(total >= 10){
      resultRow[i] = total - 10;
      carry = 1;
      if(i > 0) carryRow[i-1] = '1';
    } else {
      resultRow[i] = total;
      carry = 0;
    }
  }
  let topHtml = '<div class="vrow">' + opCell('') + Array.from({length:totalLen},(_,i)=>{
    const ch = da[i];
    return digitCell(ch === ' ' ? '' : ch, carryRow[i] || '');
  }).join('') + '</div>';
  let botHtml = '<div class="vrow">' + opCell('+') + Array.from({length:totalLen},(_,i)=> digitCell(db[i]===' '?'':db[i])).join('') + '</div>';
  let resHtml = '<div class="vrow">' + opCell('') + resultRow.map(d=>digitCell(d===''?'':d)).join('') + '</div>';
  const finalNum = resultRow.join('').replace(/^0+(?=\d)/,'').trim();
  return `<div class="vlabel">Step-by-step (right to left, carrying when a column adds to 10 or more):</div>
    <div class="vmath">${topHtml}${botHtml}<div class="vline"></div>${resHtml}</div>
    <div class="vlabel">Final answer: ${finalNum}</div>`;
}

// ===== Visual: Subtraction (borrowing) =====
function buildSubVisual(big, small){
  const len = String(big).length;
  const dTop = String(big).padStart(len,'0').split('').map(Number);
  const dBot = String(small).padStart(len,'0').split('').map(Number);
  let borrow = 0;
  const topDisplay = dTop.map(d=>({orig:d, reduced:null}));
  const resultRow = new Array(len).fill('');
  const ones12Row = new Array(len).fill('');
  for(let i=len-1;i>=0;i--){
    let top = dTop[i] - borrow;
    if(borrow) topDisplay[i].reduced = top;
    const bot = dBot[i];
    if(top < bot){
      ones12Row[i] = top + 10;
      resultRow[i] = (top+10) - bot;
      borrow = 1;
    } else {
      resultRow[i] = top - bot;
      borrow = 0;
    }
  }
  let topHtml = '<div class="vrow">' + opCell('') + dTop.map((d,i)=>{
    if(ones12Row[i] !== ''){
      return digitCell(d, String(ones12Row[i]), true);
    } else if(topDisplay[i].reduced !== null){
      return digitCell(d, String(topDisplay[i].reduced), true);
    } else {
      return digitCell(d);
    }
  }).join('') + '</div>';
  let botHtml = '<div class="vrow">' + opCell('−') + dBot.map(d=>digitCell(d)).join('') + '</div>';
  let resHtml = '<div class="vrow">' + opCell('') + resultRow.map(d=>digitCell(d)).join('') + '</div>';
  const finalNum = resultRow.join('').replace(/^0+(?=\d)/,'') || '0';
  return `<div class="vlabel">Step-by-step (right to left — crossed-out digits show what was borrowed from):</div>
    <div class="vmath">${topHtml}${botHtml}<div class="vline"></div>${resHtml}</div>
    <div class="vlabel">Final answer: ${finalNum}</div>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildStackedProblem(top, bottom, opSymbol){
  return `<div class="qmath">
    <div class="vrow">${opCell('')}${digitCell(top)}</div>
    <div class="vrow">${opCell(opSymbol)}${digitCell(bottom)}</div>
    <div class="vline"></div>
  </div>`;
}

function genAddSub(){
  const isAdd = Math.random() < 0.5;
  if (isAdd) {
    const a = randInt(1, 9);
    const b = randInt(1, 9);
    return {
      tag:'ADDITION',
      text: buildStackedProblem(a, b, '+'),
      ans: a + b,
      explain: buildAddVisual(a, b)
    };
  } else {
    const x = randInt(1, 9);
    const y = randInt(1, 9);
    const big = Math.max(x, y), small = Math.min(x, y);
    return {
      tag:'SUBTRACTION',
      text: buildStackedProblem(big, small, '−'),
      ans: big - small,
      explain: buildSubVisual(big, small)
    };
  }
}

// ===== Skip counting (click the next number) =====
function genSkipCounting(){
  const step = [2,5,10][randInt(0,2)];
  const startMultiple = randInt(0, 8);
  const start = step * startMultiple;
  const seq = [start, start+step, start+step*2, start+step*3];
  const ans = start + step*4;
  const distractSet = new Set([ans]);
  [step, -step, step*2, -step*2, 1, -1].forEach(d => {
    if (distractSet.size < 4) { const v = ans + d; if (v >= 0 && v !== ans) distractSet.add(v); }
  });
  while (distractSet.size < 4) { const v = ans + randInt(-10, 10); if (v >= 0) distractSet.add(v); }
  const choices = shuffle([...distractSet]).slice(0, 4).map(v => ({
    value: v, label: `<div style="font-size:1.5em;font-weight:bold;">${v}</div>`
  }));
  return {
    tag:'SKIP COUNTING', type:'choice',
    text:`${seq.join(', ')}, ___? Click the next number! (counting by ${step}s)`,
    choices, ans,
    explain:`<div class="vlabel">We're counting up by ${step} each time:</div>
      <div class="vstep">${seq.join(' → ')} → <b>${ans}</b></div>`
  };
}

// ===== Comparing numbers (click the bigger number) =====
function genCompare(){
  let a = randInt(10, 99), b = randInt(10, 99);
  while (a === b) { b = randInt(10, 99); }
  const bigger = Math.max(a, b);
  const choices = shuffle([a, b]).map(v => ({
    value: v, label: `<div style="font-size:1.9em;font-weight:bold;">${v}</div>`
  }));
  return {
    tag:'COMPARING NUMBERS', type:'choice',
    text:'Click the bigger number!',
    choices, ans: bigger,
    explain:`<div class="vlabel">Compare the tens digit first, then the ones digit if needed:</div>
      <div class="vstep">${a} vs ${b}</div>
      <div class="vlabel">${bigger} is bigger.</div>`
  };
}

// ===== Place value (visual base-10 blocks, click the number of ones) =====
function base10Blocks(tens, ones){
  let html = '<div style="display:flex;justify-content:center;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:4px;">';
  for (let t = 0; t < tens; t++) {
    html += '<div style="display:flex;flex-direction:column;gap:2px;" title="ten">' +
      Array(10).fill('<div style="width:20px;height:9px;background:var(--blue);border-radius:2px;"></div>').join('') +
      '</div>';
  }
  if (ones > 0) {
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;max-width:90px;align-content:flex-start;">' +
      Array(ones).fill('<div style="width:16px;height:16px;background:var(--gold);border-radius:3px;"></div>').join('') +
      '</div>';
  }
  html += '</div>';
  return html;
}

function genPlaceValue(){
  const tens = randInt(1, 8);
  const ones = randInt(1, 9);
  const num = tens * 10 + ones;
  const distractSet = new Set([ones]);
  let guard = 0;
  while (distractSet.size < 4 && guard < 30) {
    guard++;
    const v = ones + randInt(-4, 4);
    if (v >= 0 && v <= 9) distractSet.add(v);
  }
  const choices = shuffle([...distractSet]).slice(0, 4).map(v => ({
    value: v, label: `<div style="font-size:1.6em;font-weight:bold;">${v}</div>`
  }));
  return {
    tag:'PLACE VALUE', type:'choice',
    visual: base10Blocks(tens, ones),
    text:`This shows the number <b>${num}</b>. The blue rods are tens, the gold squares are ones. How many gold ones squares are there?`,
    choices, ans: ones,
    explain:`<div class="vlabel">Count the gold one-squares:</div>
      <div class="vstep">There are <b>${ones}</b> ones.</div>
      <div class="vlabel">${num} = ${tens*10} + ${ones}</div>`
  };
}

// ===== Word problems (add/subtract within 20) =====
const WORD_NAMES = ['Bradley','Emma','Jacob','Mia','Noah','Sophia'];
const WORD_ITEMS = ['apples','stickers','toy cars','marbles','cookies','crayons'];
function genWordProblem(){
  const name = WORD_NAMES[randInt(0, WORD_NAMES.length-1)];
  const item = WORD_ITEMS[randInt(0, WORD_ITEMS.length-1)];
  const isAdd = Math.random() < 0.5;
  if(isAdd){
    const a = randInt(2,9), b = randInt(1,9);
    const ans = a+b;
    return {
      tag:'WORD PROBLEM', text:`${name} has ${a} ${item}. A friend gives ${name} ${b} more. How many ${item} does ${name} have now?`, ans,
      explain:`<div class="vlabel">Start with what ${name} has, then add the new ones:</div>
        <div class="vstep">${a} + ${b} = <b>${ans}</b></div>
        <div class="vlabel">Final answer: ${ans}</div>`
    };
  } else {
    const start = randInt(5,9);
    const taken = randInt(1, start-1);
    const ans = start - taken;
    return {
      tag:'WORD PROBLEM', text:`${name} has ${start} ${item}. ${name} gives away ${taken}. How many ${item} are left?`, ans,
      explain:`<div class="vlabel">Start with what ${name} has, then take away the ones given:</div>
        <div class="vstep">${start} − ${taken} = <b>${ans}</b></div>
        <div class="vlabel">Final answer: ${ans}</div>`
    };
  }
}

// ===== Equal groups (intro to multiplication via repeated addition) =====
function iconLabel(icon, count){
  return `<div style="font-size:1.1em;letter-spacing:3px;line-height:1.4;max-width:150px;margin:0 auto;word-break:break-all;">${icon.repeat(count)}</div><div style="margin-top:6px;font-weight:bold;font-size:0.85em;">(${count})</div>`;
}

function genEqualGroups(){
  const groups = randInt(2,4);
  const perGroup = [2,5][randInt(0,1)];
  const ans = groups * perGroup;
  const icon = ['⭐','🍎','🚗','🐶'][randInt(0,3)];
  const groupsHtml = Array.from({length:groups}, () =>
    `<span style="display:inline-block;background:var(--cream);border-radius:10px;padding:8px 10px;margin:4px;font-size:1.3em;letter-spacing:2px;">${icon.repeat(perGroup)}</span>`
  ).join('');

  const distractSet = new Set([ans]);
  const deltas = [-perGroup, perGroup, -groups, groups, -2, 2, perGroup*2, -perGroup*2, 1, -1];
  for (const d of deltas) {
    if (distractSet.size >= 4) break;
    const val = ans + d;
    if (val > 0 && val <= 25 && val !== ans) distractSet.add(val);
  }
  while (distractSet.size < 4) {
    const val = ans + randInt(-6, 6);
    if (val > 0 && val <= 25) distractSet.add(val);
  }
  let choiceVals = shuffle([...distractSet]).slice(0, 4);
  if (!choiceVals.includes(ans)) choiceVals[randInt(0,3)] = ans;

  return {
    tag:'EQUAL GROUPS', type:'choice',
    visual: groupsHtml,
    text:`${groups} groups of ${perGroup} — click the picture group that shows the total!`,
    choices: choiceVals.map(v => ({ value:v, label: iconLabel(icon, v) })),
    ans,
    explain:`<div class="vlabel">Add the same number, ${groups} times:</div>
      <div class="vstep">${Array(groups).fill(perGroup).join(' + ')} = <b>${ans}</b></div>
      <div class="vlabel">Final answer: ${ans}</div>`
  };
}

const generators = [genAddSub, genSkipCounting, genCompare, genPlaceValue, genWordProblem, genEqualGroups];

let misses = 0;

function skipProblem(){
  nextProblem();
}

function nextProblem(){
  const gen = generators[randInt(0, generators.length - 1)];
  current = gen();
  misses = 0;
  document.getElementById('tag').textContent = current.tag;
  const qtextEl = document.getElementById('qtext');
  qtextEl.innerHTML = current.visual
    ? `<div>${current.visual}</div><div style="margin-top:14px;">${current.text}</div>`
    : current.text;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('explainBox').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';

  const answerInput = document.getElementById('answer');
  const choiceGrid = document.getElementById('choiceGrid');

  if (current.type === 'choice') {
    document.getElementById('checkBtn').style.display = 'none';
    answerInput.style.display = 'none';
    choiceGrid.style.display = 'grid';
    choiceGrid.innerHTML = '';
    current.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = choice.label;
      btn.onclick = () => selectChoice(choice.value, btn);
      choiceGrid.appendChild(btn);
    });
  } else {
    document.getElementById('checkBtn').style.display = 'inline-block';
    answerInput.style.display = 'inline-block';
    choiceGrid.style.display = 'none';
    answerInput.value = '';
    answerInput.disabled = false;
    answerInput.focus();
  }
}

function selectChoice(val, clickedBtn){
  const fb = document.getElementById('feedback');
  const ex = document.getElementById('explainBox');

  if (val === current.ans) {
    attempts++;
    score++; streak++;
    if (streak > best) best = streak;
    clickedBtn.classList.add('picked-correct');
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    fb.textContent = '✅ Correct!';
    fb.className = 'feedback correct';
    ex.classList.remove('show');
    updateStats();
    document.getElementById('nextBtn').style.display = 'inline-block';
  } else {
    misses++;
    clickedBtn.classList.add('picked-wrong');
    clickedBtn.disabled = true;
    if (misses >= 2) {
      attempts++;
      streak = 0;
      document.querySelectorAll('.choice-btn').forEach((b, i) => {
        b.disabled = true;
        if (current.choices[i].value === current.ans) b.classList.add('picked-correct');
      });
      fb.textContent = "❌ Not quite — here's the answer:";
      fb.className = 'feedback incorrect';
      ex.innerHTML = current.explain;
      ex.classList.add('show');
      updateStats();
      document.getElementById('nextBtn').style.display = 'inline-block';
    } else {
      fb.textContent = 'Not quite — try again!';
      fb.className = 'feedback incorrect';
    }
  }
}

function checkAnswer(){
  const input = document.getElementById('answer');
  const fb = document.getElementById('feedback');
  const ex = document.getElementById('explainBox');
  if(input.value === ''){
    fb.textContent = 'Type an answer first!';
    fb.className = 'feedback incorrect';
    return;
  }
  const val = Number(input.value);
  if(val === current.ans){
    attempts++;
    score++; streak++;
    if(streak > best) best = streak;
    fb.textContent = '✅ Correct!';
    fb.className = 'feedback correct';
    ex.classList.remove('show');
    updateStats();
    document.getElementById('checkBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'inline-block';
    input.disabled = true;
  } else {
    misses++;
    if (misses >= 2) {
      attempts++;
      streak = 0;
      fb.textContent = "❌ Not quite — here's the answer:";
      fb.className = 'feedback incorrect';
      ex.innerHTML = current.explain;
      ex.classList.add('show');
      updateStats();
      document.getElementById('checkBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'inline-block';
      input.disabled = true;
    } else {
      fb.textContent = 'Not quite — try again!';
      fb.className = 'feedback incorrect';
      input.value = '';
      input.focus();
    }
  }
}

function updateStats(){
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('attemptNum').textContent = attempts;
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('bestNum').textContent = best;
  if(streak > 0 && streak % 12 === 0){
    openRewardGame();
  }
}


// ---- Reward Games (rotates through 3 different mini-games) ----
let rewardCount = 0;
const EMOJIS = ['🚀','⭐','🐉','🍕','🎲','🦄','🌈','🎮'];
let memState = { first:null, lock:false, matchedCount:0 };
let seqState = { next:1 };
let simonState = { sequence:[], playerStep:0, playing:false };

function openRewardGame(){
  const overlay = document.getElementById('rewardOverlay');
  overlay.classList.add('show');
  const gameType = rewardCount % 3;
  rewardCount++;
  if(gameType === 0) setupMemoryGame();
  else if(gameType === 1) setupSequenceGame();
  else setupSimonGame();
}

function closeRewardGame(){
  document.getElementById('rewardOverlay').classList.remove('show');
  simonState.playing = false;
}

// Game 1: Memory Match
function setupMemoryGame(){
  document.getElementById('gameTitle').textContent = '🎉 12 in a Row!';
  document.getElementById('gameSub').textContent = 'You unlocked Memory Match!';
  document.getElementById('gameStatus').textContent = 'Find all the matching pairs!';
  const chosen = [...EMOJIS].sort(()=>Math.random()-0.5).slice(0,6);
  let deck = [...chosen, ...chosen].sort(()=>Math.random()-0.5);
  memState = { first:null, lock:false, matchedCount:0 };
  const content = document.getElementById('gameContent');
  content.innerHTML = '<div class="memory-grid" id="memoryGrid"></div>';
  const grid = document.getElementById('memoryGrid');
  deck.forEach((emoji, idx)=>{
    const tile = document.createElement('div');
    tile.className = 'memory-tile';
    tile.dataset.idx = idx;
    tile.dataset.emoji = emoji;
    tile.textContent = '❓';
    tile.onclick = ()=>flipTile(tile);
    grid.appendChild(tile);
  });
}

function flipTile(tile){
  if(memState.lock) return;
  if(tile.classList.contains('flipped') || tile.classList.contains('matched')) return;
  tile.classList.add('flipped');
  tile.textContent = tile.dataset.emoji;
  if(memState.first === null){
    memState.first = tile;
  } else {
    const first = memState.first, second = tile;
    if(first.dataset.emoji === second.dataset.emoji){
      first.classList.add('matched');
      second.classList.add('matched');
      memState.first = null;
      memState.matchedCount++;
      if(memState.matchedCount === 6){
        document.getElementById('gameStatus').textContent = '🏆 You matched them all! Great job!';
      }
    } else {
      memState.lock = true;
      setTimeout(()=>{
        first.classList.remove('flipped'); first.textContent = '❓';
        second.classList.remove('flipped'); second.textContent = '❓';
        memState.first = null; memState.lock = false;
      }, 700);
    }
  }
}

// Game 2: Number Sequence (click 1-12 in order, shuffled positions)
function setupSequenceGame(){
  document.getElementById('gameTitle').textContent = '🎉 Another Streak!';
  document.getElementById('gameSub').textContent = 'You unlocked Number Rush!';
  document.getElementById('gameStatus').textContent = 'Click the numbers 1 → 12 in order, as fast as you can!';
  seqState = { next:1 };
  const nums = Array.from({length:12}, (_,i)=>i+1).sort(()=>Math.random()-0.5);
  const content = document.getElementById('gameContent');
  content.innerHTML = '<div class="seq-grid" id="seqGrid"></div>';
  const grid = document.getElementById('seqGrid');
  nums.forEach(n=>{
    const tile = document.createElement('div');
    tile.className = 'seq-tile';
    tile.textContent = n;
    tile.dataset.num = n;
    tile.onclick = ()=>clickSeqTile(tile);
    grid.appendChild(tile);
  });
}

function clickSeqTile(tile){
  const num = Number(tile.dataset.num);
  if(tile.classList.contains('used')) return;
  if(num === seqState.next){
    tile.classList.add('used');
    seqState.next++;
    if(seqState.next === 13){
      document.getElementById('gameStatus').textContent = '🏆 Awesome! You got them all in order!';
    }
  } else {
    tile.classList.add('wrong');
    setTimeout(()=>tile.classList.remove('wrong'), 300);
  }
}

// Game 3: Simon-style color memory
function setupSimonGame(){
  document.getElementById('gameTitle').textContent = '🎉 Streak Power!';
  document.getElementById('gameSub').textContent = 'You unlocked Color Memory!';
  document.getElementById('gameStatus').textContent = 'Watch the pattern, then repeat it!';
  simonState = { sequence:[], playerStep:0, playing:false };
  const colors = ['red','green','teal','gold'];
  const content = document.getElementById('gameContent');
  content.innerHTML = '<div class="simon-grid" id="simonGrid"></div>';
  const grid = document.getElementById('simonGrid');
  colors.forEach(c=>{
    const tile = document.createElement('div');
    tile.className = 'simon-tile ' + c;
    tile.dataset.color = c;
    tile.onclick = ()=>simonClick(tile);
    grid.appendChild(tile);
  });
  simonState.sequence = [colors[randInt(0,3)]];
  setTimeout(()=>playSimonSequence(), 600);
}

function playSimonSequence(){
  simonState.playing = true;
  simonState.playerStep = 0;
  document.getElementById('gameStatus').textContent = 'Watch closely...';
  const grid = document.getElementById('simonGrid');
  let i = 0;
  const interval = setInterval(()=>{
    if(i > 0){
      const prevTile = grid.querySelector(`[data-color="${simonState.sequence[i-1]}"]`);
      if(prevTile) prevTile.classList.remove('lit');
    }
    if(i >= simonState.sequence.length){
      clearInterval(interval);
      simonState.playing = false;
      document.getElementById('gameStatus').textContent = `Your turn! Repeat the pattern (${simonState.sequence.length} step${simonState.sequence.length>1?'s':''}).`;
      return;
    }
    const tile = grid.querySelector(`[data-color="${simonState.sequence[i]}"]`);
    if(tile) tile.classList.add('lit');
    i++;
  }, 700);
}

function simonClick(tile){
  if(simonState.playing) return;
  const color = tile.dataset.color;
  tile.classList.add('lit');
  setTimeout(()=>tile.classList.remove('lit'), 250);
  if(color === simonState.sequence[simonState.playerStep]){
    simonState.playerStep++;
    if(simonState.playerStep === simonState.sequence.length){
      if(simonState.sequence.length >= 6){
        document.getElementById('gameStatus').textContent = '🏆 Amazing memory! You completed it!';
        return;
      }
      const colors = ['red','green','teal','gold'];
      simonState.sequence.push(colors[randInt(0,3)]);
      document.getElementById('gameStatus').textContent = 'Nice! Get ready for the next round...';
      setTimeout(()=>playSimonSequence(), 900);
    }
  } else {
    document.getElementById('gameStatus').textContent = '❌ Oops, that broke the pattern. Try again!';
    simonState.sequence = [simonState.sequence[0]];
    setTimeout(()=>playSimonSequence(), 1000);
  }
}

document.addEventListener('keydown', (e)=>{
  if(e.key !== 'Enter') return;
  e.preventDefault();
  if(document.getElementById('rewardOverlay').classList.contains('show')){
    closeRewardGame();
    return;
  }
  if(document.getElementById('checkBtn').style.display !== 'none'){
    checkAnswer();
  } else if(document.getElementById('nextBtn').style.display !== 'none'){
    nextProblem();
  }
});

nextProblem();
</script>
